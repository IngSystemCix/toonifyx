<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToonifyX</title>
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom Scrollbar */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #334155;
    }
  </style>
</head>
<body class="bg-[#020617] text-slate-200 font-sans selection:bg-sky-500/30 antialiased">

  <div class="min-h-screen flex justify-center items-start py-12 px-4 sm:px-6 lg:px-0 relative">
    <!-- Background decoration -->
    <div class="absolute -top-1/4 -left-1/4 w-2/5 h-2/5 bg-sky-500/10 blur-[120px] rounded-full pointer-events-none"></div>
    <div class="absolute -bottom-1/4 -right-1/4 w-2/5 h-2/5 bg-indigo-500/10 blur-[120px] rounded-full pointer-events-none"></div>

    <main class="relative z-10 max-w-5xl w-full grid gap-8 sm:grid-cols-1 lg:grid-cols-2">

      <!-- Input Section -->
      <section class="space-y-4">
        <div class="text-center sm:text-left mb-4">
          <span class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-sky-500/10 border border-sky-500/20 text-sky-400 text-xs font-semibold uppercase tracking-wider">
            ✨ AI Powered Engine
          </span>
          <h1 class="text-4xl sm:text-5xl lg:text-6xl font-bold tracking-tight text-white mt-4">
            Toonify<span class="text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-indigo-500">X</span>
          </h1>
          <p class="text-slate-400 mt-2 text-base sm:text-lg max-w-full sm:max-w-xl">
            Convierte tu JSON en formato Toon simplificado para usar con IA de manera eficiente.
          </p>
        </div>

        <div class="flex items-center justify-between mb-2">
          <span class="flex items-center gap-2 text-slate-300 font-medium">💻 Entrada JSON</span>
          <span class="text-xs text-slate-500 font-mono">application/json</span>
        </div>

        <div class="relative group">
          <div class="absolute -inset-0.5 bg-gradient-to-r from-sky-500 to-indigo-500 rounded-2xl blur opacity-20 group-hover:opacity-30 transition duration-500"></div>
          <textarea id="jsonInput" class="relative w-full h-72 sm:h-80 bg-[#0f172a] border border-slate-800 rounded-xl p-4 sm:p-6 font-mono text-sm text-sky-300 outline-none focus:border-sky-500/50 transition-colors resize-none shadow-2xl" placeholder='{"key": "value"}'>
{
  "name": "Juan",
  "role": "developer",
  "power": "coding"
}
          </textarea>
        </div>

        <button id="btnToonify" class="w-full relative group overflow-hidden rounded-xl bg-gradient-to-r from-sky-500 to-indigo-600 p-px font-semibold text-white shadow-lg active:scale-[0.98] transition-all mt-4">
          <div class="relative flex items-center justify-center gap-2 bg-[#020617] group-hover:bg-transparent py-4 rounded-[11px] transition-all duration-300">
            🚀 <span id="btnText">Convertir a Toon</span>
          </div>
        </button>
      </section>

      <!-- Result Section -->
      <section class="space-y-4">
        <div class="flex items-center justify-between mb-2">
          <span class="flex items-center gap-2 text-slate-300 font-medium">🖥 Resultado Toon</span>
          <button id="copyBtn" class="hidden flex items-center gap-1 text-xs text-slate-500 hover:text-sky-400 transition-colors">
            📋 <span id="copyText">Copiar</span>
          </button>
        </div>

        <div class="relative min-h-[300px] sm:min-h-[380px]">
          <div class="absolute inset-0 bg-slate-900/50 border border-slate-800 rounded-xl overflow-hidden shadow-2xl p-4 custom-scrollbar">
            <pre id="result" class="whitespace-pre-wrap text-base sm:text-lg italic text-slate-300">// Ingresa un JSON y presiona el botón para ver la magia.</pre>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script>
    const btn = document.getElementById('btnToonify');
    const btnText = document.getElementById('btnText');
    const resultBox = document.getElementById('result');
    const copyBtn = document.getElementById('copyBtn');
    const copyText = document.getElementById('copyText');

    btn.addEventListener('click', async () => {
      let jsonInput = document.getElementById('jsonInput').value;
      resultBox.textContent = 'Procesando...';
      btnText.textContent = 'Procesando...';

      try {
        const parsed = JSON.parse(jsonInput);

        const res = await fetch('/api/toon', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(parsed),
        });

        const data = await res.json();

        if (data.error) {
          resultBox.textContent = data.error;
          resultBox.classList.add('text-red-400');
        } else {
          resultBox.textContent = data.result;
          resultBox.classList.remove('text-red-400');
          copyBtn.classList.remove('hidden');
        }
      } catch (err) {
        resultBox.textContent = 'Error: JSON inválido';
        resultBox.classList.add('text-red-400');
      } finally {
        btnText.textContent = 'Convertir a Toon';
      }
    });

    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(resultBox.textContent);
      copyText.textContent = 'Copiado';
      setTimeout(() => copyText.textContent = 'Copiar', 2000);
    });
  </script>

</body>
</html>
